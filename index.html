        /* ==========================================================================
           COLORLIB TOP PREVIEW HEADER STATE BAR
           ========================================================================== */
        .colorlib-preview-bar {
            background-color: #111111;
            height: 65px;

            align-items: center;

            color: #ffffff;

        }

            color: #7bc043;
        }

        .task-tag {
            background-color: whitesmoke;
            color: #aaaaaa;
            border: 1px solid #333333;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 4px;
            text-transform: uppercase;
        }

        /* Right Side Content Master Container */
        .right-side-controls {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .device-switcher {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .device-btn {
            background: none;
            border: none;
            color: #666666;
            font-size: 18px;
            padding: 10px 14px;
            cursor: pointer;
            transition: color 0.2s, background-color 0.2s;
            border-radius: 4px;
        }

        .device-btn:hover, .device-btn.active {
            color: #ffffff;
            background-color: #222222;
        }

        .right-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .heart-wrapper {
            position: relative;
            cursor: pointer;
            display: inline-block;
        }

        .heart-icon {
            color: #888888;
            transition: color 0.3s ease;
        }
        
        .heart-wrapper.liked .heart-icon {
            color: #ff4d4d !important;
        }

        .heart-badge {
            position: absolute;
            top: -7px;
            right: -8px;
            background-color: #ff4d4d;
            color: #ffffff;
            font-size: 10px;
            font-weight: bold;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s ease;
        }

        .heart-wrapper.liked .heart-badge {
            opacity: 1;
            transform: scale(1);
        }

        .cart-btn {
            background-color: #7bc043;
            color: white;
            border: none;
            padding: 20px 22px;
            margin-right: -20px;
            cursor: pointer;
            height: 65px;
            display: flex;
            align-items: center;
        }

        @media (max-width: 767px) {
            .task-tag, .device-switcher {
                display: none !important;
            }
            .colorlib-preview-bar { padding: 0 15px; }
            .right-side-controls { gap: 15px; }
            .cart-btn { padding: 20px 18px; margin-right: -15px; }
        }

        /* ==========================================================================
           RESPONSIVE VIEWPORT IFRAME HARNESS VIEW ENGINE

        .preview-window-container {

            border-radius: 24px;
        }

        .site-iframe-wrapper.device-mobile {
            max-width: 375px;
            height: 85%;
            border: 12px solid #333333;
            border-radius: 32px;
        }
